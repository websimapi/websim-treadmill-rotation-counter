<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treadmill Rotation Counter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div id="app-container">
        <h1>Treadmill Rotation Counter</h1>
        <p>Print the QR code below and tape it securely to your treadmill belt or roller. Point your camera at the moving QR code.</p>

        <img id="qr-to-print" src="qrcode.png" alt="QR Code to print">
        
        <div id="camera-feed">
            <video id="video" playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
            <div id="status-message">Awaiting camera access...</div>
        </div>

        <div id="counter-display">
            <h2>Rotations Detected: <span id="rotation-count">0</span></h2>
            <div id="detection-indicator">
                Detection Status: <span id="current-detection-status">Awaiting detection...</span>
            </div>
        </div>
    </div>
    
    <script type="module" src="main.js"></script>

</body>
</html>
